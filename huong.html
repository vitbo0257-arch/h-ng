<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Đặng Thu Thảo Hương</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffafbd, #ffc3a0);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .profile-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #f0f0f0;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            border: 5px solid #ffafbd;
        }
        h1 {
            color: #333;
            margin: 10px 0;
            font-size: 24px;
        }
        .info {
            color: #666;
            margin: 5px 0;
            font-size: 16px;
        }
        .tag {
            display: inline-block;
            background: #ffebee;
            color: #e91e63;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin-top: 10px;
            font-weight: bold;
        }
        .dream {
            margin-top: 20px;
            padding: 15px;
            border-top: 1px dashed #ccc;
        }
        .dream-text {
            color: #d81b60;
            font-weight: italic;
        }
        .korea-flag {
            width: 30px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="avatar">🌸</div>
    <h1>Đặng Thu Thảo Hương</h1>
    <p class="info">🎓 Học sinh lớp <b>12E</b></p>
    <p class="info">🏫 THPT Nam Sách 2</p>
    <span class="tag">Gen Z Developer Intern</span>

    <div class="dream">
        <p><b>Mục tiêu lớn nhất:</b></p>
        <p class="dream-text">Chạm tay đến ước mơ du học Hàn Quốc 🇰🇷</p>
        <p style="font-size: 13px; color: #888;">"Cố gắng hết mình cho kỳ thi sắp tới!"</p>
    </div>
</div>

</body>
</html>
